<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travelling Salesman Problem</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #canvas-container {
      flex: 1;
      position: relative;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    #panel {
      width: 220px;
      background: #161b22;
      border-left: 1px solid #30363d;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .stat-group {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
    }

    .stat-label {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #e6edf3;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: #3fb950;
      margin-top: 4px;
      min-height: 14px;
    }

    button {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #e6edf3;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    button:hover { background: #30363d; border-color: #8b949e; }
    button:active { background: #161b22; }

    button.primary {
      background: #1f6feb;
      border-color: #1f6feb;
      color: white;
      font-weight: 600;
    }

    button.primary:hover { background: #388bfd; border-color: #388bfd; }

    button.primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: #1f6feb;
    }

    button.stop {
      background: #da3633;
      border-color: #da3633;
      color: white;
      font-weight: 600;
    }

    button.stop:hover { background: #f85149; border-color: #f85149; }

    button.danger { border-color: #f8514966; color: #f85149; }
    button.danger:hover { background: #f851491a; border-color: #f85149; }

    .field-label {
      font-size: 11px;
      color: #8b949e;
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    input[type=range] {
      width: 100%;
      accent-color: #1f6feb;
      cursor: pointer;
    }

    select {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #e6edf3;
      font-size: 13px;
      cursor: pointer;
    }

    #status {
      font-size: 12px;
      color: #8b949e;
      min-height: 32px;
      line-height: 1.5;
    }

    .status-solving { color: #f0883e; }
    .status-done { color: #3fb950; }
    .status-error { color: #f85149; }

    hr {
      border: none;
      border-top: 1px solid #21262d;
    }

    .hint {
      font-size: 11px;
      color: #484f58;
      line-height: 1.6;
      margin-top: auto;
    }
  </style>
</head>
<body>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<div id="panel">
  <h1>TSP Visualizer</h1>

  <div class="stat-group">
    <div class="stat-label">Cities</div>
    <div class="stat-value" id="city-count">0</div>
  </div>

  <div class="stat-group">
    <div class="stat-label">Tour Length</div>
    <div class="stat-value" id="tour-length">—</div>
    <div class="stat-sub" id="improvement"></div>
  </div>

  <hr>

  <div>
    <div class="field-label">
      <span>Random cities</span>
      <span id="n-cities-val">20</span>
    </div>
    <input type="range" id="n-cities" min="3" max="150" value="20">
  </div>

  <button id="btn-random">Add Random Cities</button>

  <hr>

  <div>
    <div class="field-label"><span>Algorithm</span></div>
    <select id="algorithm">
      <option value="random">Random</option>
      <option value="nn">Nearest Neighbor</option>
      <option value="nn2opt" selected>NN + 2-opt</option>
    </select>
  </div>

  <div>
    <div class="field-label">
      <span>Speed</span>
      <span id="speed-val">Fast</span>
    </div>
    <input type="range" id="speed" min="0" max="4" value="3">
  </div>

  <button class="primary" id="btn-solve">Solve</button>

  <div id="status">Click the canvas to add cities</div>

  <hr>

  <button class="danger" id="btn-clear">Clear All</button>

  <p class="hint">Click the canvas to place cities. Drag the sliders to control city count and animation speed.</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');

const cityCountEl   = document.getElementById('city-count');
const tourLengthEl  = document.getElementById('tour-length');
const improvementEl = document.getElementById('improvement');
const statusEl      = document.getElementById('status');
const nCitiesSlider = document.getElementById('n-cities');
const nCitiesVal    = document.getElementById('n-cities-val');
const speedSlider   = document.getElementById('speed');
const speedValEl    = document.getElementById('speed-val');
const btnSolve      = document.getElementById('btn-solve');
const btnRandom     = document.getElementById('btn-random');
const btnClear      = document.getElementById('btn-clear');
const algoSelect    = document.getElementById('algorithm');

// ms delay between animation steps; 0 = max speed (many steps/frame)
const SPEEDS       = [600, 120, 30, 8, 0];
const SPEED_LABELS = ['Slow', 'Normal', 'Fast', 'Turbo', 'Max'];

let cities = [];
let tour   = [];
let solving = false;
let timer   = null;

let bestLength    = Infinity;
let initialLength = Infinity;
let swapHighlight = null;  // { i, j } indices into tour
let swapTime      = 0;

function resize() {
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;
  draw();
}
window.addEventListener('resize', resize);
resize();

nCitiesSlider.addEventListener('input', () => {
  nCitiesVal.textContent = nCitiesSlider.value;
});

speedSlider.addEventListener('input', () => {
  speedValEl.textContent = SPEED_LABELS[speedSlider.value];
});

canvas.addEventListener('click', e => {
  if (solving) return;
  const rect = canvas.getBoundingClientRect();
  cities.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
  tour = [];
  bestLength = initialLength = Infinity;
  updateStats();
  draw();
  statusEl.textContent = `${cities.length} cit${cities.length === 1 ? 'y' : 'ies'} placed`;
  statusEl.className = '';
});

btnRandom.addEventListener('click', () => {
  if (solving) return;
  const n = parseInt(nCitiesSlider.value);
  const margin = 50;
  cities = Array.from({ length: n }, () => ({
    x: margin + Math.random() * (canvas.width  - margin * 2),
    y: margin + Math.random() * (canvas.height - margin * 2),
  }));
  tour = [];
  bestLength = initialLength = Infinity;
  updateStats();
  draw();
  statusEl.textContent = `${n} cities placed`;
  statusEl.className = '';
});

btnClear.addEventListener('click', () => {
  stopSolving();
  cities = [];
  tour = [];
  bestLength = initialLength = Infinity;
  swapHighlight = null;
  updateStats();
  draw();
  statusEl.textContent = 'Click the canvas to add cities';
  statusEl.className = '';
});

btnSolve.addEventListener('click', () => {
  if (solving) {
    stopSolving();
    statusEl.textContent = 'Stopped early.';
    statusEl.className = '';
    return;
  }
  if (cities.length < 2) {
    statusEl.textContent = 'Add at least 2 cities first.';
    statusEl.className = 'status-error';
    return;
  }
  startSolving();
});

function updateStats() {
  cityCountEl.textContent = cities.length;
  if (tour.length > 0 && bestLength < Infinity) {
    tourLengthEl.textContent = Math.round(bestLength).toLocaleString();
    if (initialLength < Infinity && bestLength < initialLength - 0.5) {
      const pct = ((initialLength - bestLength) / initialLength * 100).toFixed(1);
      improvementEl.textContent = `${pct}% improvement via 2-opt`;
    } else if (tour.length > 0) {
      improvementEl.textContent = 'Nearest neighbor solution';
    }
  } else {
    tourLengthEl.textContent = '—';
    improvementEl.textContent = '';
  }
}

function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function tourLength(t) {
  let len = 0;
  const n = t.length;
  for (let i = 0; i < n; i++) len += dist(cities[t[i]], cities[t[(i + 1) % n]]);
  return len;
}

function randomTour() {
  const t = Array.from({ length: cities.length }, (_, i) => i);
  for (let i = t.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [t[i], t[j]] = [t[j], t[i]];
  }
  return t;
}

function nearestNeighbor() {
  const n = cities.length;
  const visited = new Uint8Array(n);
  // Start from a random city
  const start = Math.floor(Math.random() * n);
  const t = [start];
  visited[start] = 1;
  for (let step = 1; step < n; step++) {
    const last = t[t.length - 1];
    let best = -1, bd = Infinity;
    for (let j = 0; j < n; j++) {
      if (!visited[j]) {
        const d = dist(cities[last], cities[j]);
        if (d < bd) { bd = d; best = j; }
      }
    }
    t.push(best);
    visited[best] = 1;
  }
  return t;
}

function* twoOptGen(t) {
  const n = t.length;
  let improved = true;
  while (improved) {
    improved = false;
    for (let i = 0; i < n - 1; i++) {
      for (let j = i + 2; j < n; j++) {
        if (i === 0 && j === n - 1) continue;
        const a = t[i], b = t[i + 1], c = t[j], d = t[(j + 1) % n];
        const before = dist(cities[a], cities[b]) + dist(cities[c], cities[d]);
        const after  = dist(cities[a], cities[c]) + dist(cities[b], cities[d]);
        if (after < before - 0.001) {
          // Reverse segment [i+1 .. j]
          let l = i + 1, r = j;
          while (l < r) { [t[l], t[r]] = [t[r], t[l]]; l++; r--; }
          improved = true;
          yield { i, j };
        }
      }
    }
  }
}

let gen = null;

function stopSolving() {
  solving = false;
  clearTimeout(timer);
  timer = null;
  btnSolve.textContent = 'Solve';
  btnSolve.className = 'primary';
}

function startSolving() {
  solving = true;
  btnSolve.textContent = 'Stop';
  btnSolve.className = 'stop';
  swapHighlight = null;

  if (algoSelect.value === 'random') {
    tour = randomTour();
    bestLength = initialLength = tourLength(tour);
    updateStats();
    draw();
    stopSolving();
    statusEl.textContent = 'Done — random tour.';
    statusEl.className = 'status-done';
    return;
  }

  statusEl.textContent = 'Building nearest-neighbor tour…';
  statusEl.className = 'status-solving';

  tour = nearestNeighbor();
  bestLength = initialLength = tourLength(tour);
  updateStats();
  draw();

  if (algoSelect.value === 'nn') {
    stopSolving();
    statusEl.textContent = 'Done — nearest-neighbor solution.';
    statusEl.className = 'status-done';
    return;
  }

  statusEl.textContent = 'Running 2-opt optimization…';
  gen = twoOptGen(tour);
  scheduleStep();
}

function scheduleStep() {
  const delay = SPEEDS[speedSlider.value];
  if (delay === 0) {
    // Run many steps synchronously then yield to browser
    timer = requestAnimationFrame(runBatch);
  } else {
    timer = setTimeout(() => requestAnimationFrame(runOne), delay);
  }
}

function runBatch() {
  if (!solving) return;
  // Run up to N steps per animation frame at max speed
  const BATCH = 80;
  let last = null;
  let done = false;
  for (let s = 0; s < BATCH && !done; s++) {
    const { value, done: d } = gen.next();
    done = d;
    if (value) last = value;
  }
  if (last) {
    swapHighlight = last;
    swapTime = performance.now();
    bestLength = tourLength(tour);
    updateStats();
  }
  draw(performance.now());
  if (done) {
    finishSolving();
  } else {
    scheduleStep();
  }
}

function runOne() {
  if (!solving) return;
  const { value, done } = gen.next();
  if (value) {
    swapHighlight = value;
    swapTime = performance.now();
    bestLength = tourLength(tour);
    updateStats();
  }
  draw(performance.now());
  if (done) {
    finishSolving();
  } else {
    scheduleStep();
  }
}

function finishSolving() {
  stopSolving();
  swapHighlight = null;
  statusEl.textContent = '2-opt complete — local optimum reached.';
  statusEl.className = 'status-done';
  draw(performance.now());
}

function draw(now) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Subtle grid
  ctx.strokeStyle = '#161b22';
  ctx.lineWidth = 1;
  const gs = 48;
  for (let x = 0; x < w; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  // Tour edges
  if (tour.length > 1) {
    const n = tour.length;
    const highlightAge = (now && swapHighlight) ? now - swapTime : Infinity;
    const hlAlpha = Math.max(0, 1 - highlightAge / 500);

    for (let i = 0; i < n; i++) {
      const a = cities[tour[i]];
      const b = cities[tour[(i + 1) % n]];

      let highlighted = false;
      if (swapHighlight && hlAlpha > 0) {
        const { i: si, j: sj } = swapHighlight;
        if (i === si || i === sj || i === si + 1 || (i + 1) % n === sj) highlighted = true;
      }

      if (highlighted) {
        ctx.strokeStyle = `rgba(56, 189, 248, ${0.4 + 0.6 * hlAlpha})`;
        ctx.lineWidth = 2.5;
      } else {
        ctx.strokeStyle = '#388bfd66';
        ctx.lineWidth = 1.5;
      }

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // Direction arrows on a few edges (sparse, only when not too many cities)
    if (cities.length <= 40 && !solving) {
      ctx.fillStyle = '#388bfd99';
      for (let i = 0; i < n; i += Math.max(1, Math.floor(n / 12))) {
        const a = cities[tour[i]];
        const b = cities[tour[(i + 1) % n]];
        drawArrow(a, b);
      }
    }
  }

  // Cities
  for (let i = 0; i < cities.length; i++) {
    const c = cities[i];

    // Glow
    const grd = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, 12);
    grd.addColorStop(0, '#388bfd33');
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(c.x, c.y, 12, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Dot
    ctx.beginPath();
    ctx.arc(c.x, c.y, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = '#58a6ff';
    ctx.fill();
    ctx.strokeStyle = '#e6edf3cc';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Empty-state hint
  if (cities.length === 0) {
    ctx.fillStyle = '#30363d';
    ctx.font = '500 18px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Click to place cities', w / 2, h / 2);
    ctx.font = '13px system-ui';
    ctx.fillStyle = '#484f58';
    ctx.fillText('or use "Add Random Cities" in the panel', w / 2, h / 2 + 30);
    ctx.textAlign = 'left';
  }
}

function drawArrow(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 20) return;
  const mx = a.x + dx * 0.5, my = a.y + dy * 0.5;
  const ux = dx / len, uy = dy / len;
  const s = 6;
  ctx.beginPath();
  ctx.moveTo(mx + ux * s, my + uy * s);
  ctx.lineTo(mx - ux * s - uy * s * 0.6, my - uy * s + ux * s * 0.6);
  ctx.lineTo(mx - ux * s + uy * s * 0.6, my - uy * s - ux * s * 0.6);
  ctx.closePath();
  ctx.fill();
}
</script>
</body>
</html>
